services:
  coworker:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${COWORKER_BUILD_TARGET:-runtime}
    image: ${COWORKER_IMAGE:-ghcr.io/virtualbeingsresearch/coworker:latest}
    container_name: coworker
    restart: unless-stopped
    ports:
      # The container needs 0.0.0.0 internally; keep the host port private by default.
      - "127.0.0.1:8000:8000"
    environment:
      - API__HOST=0.0.0.0
      - HF_HOME=/opt/huggingface
      - TZ=Asia/Shanghai
    volumes:
      - .:/app
      - type: volume
        source: coworker-home
        target: /root
        volume:
          nocopy: true
      # An empty volume is populated from a preloaded image on first use; otherwise
      # it keeps the model downloaded lazily at runtime across container recreation.
      - type: volume
        source: coworker-models
        target: /opt/huggingface

volumes:
  coworker-home:
  coworker-models:
